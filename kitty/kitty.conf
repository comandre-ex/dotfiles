include colors.conf

# ── SHELL ──
shell zsh
shell_integration enabled

# ── FONT ──
font_family      Hack Bold Nerd Font
bold_font        auto
italic_font      auto
font_size        18.0
adjust_font_size 1.5

# ── CURSOR ──
cursor              #00ff00
cursor_shape        beam
cursor_beam_thickness 2.0
cursor_blink_interval 0

# ── SCROLLBACK & MOUSE ──
scrollback_lines    8000
scrollback_pager    less --chop-long-lines --RAW-CONTROL-CHARS --no-init
mouse_hide_wait     3.0
copy_on_select      yes

# ── URL ──
detect_urls         yes
url_color           #0087bd
url_style           double
open_url_with       default
url_prefixes        ftp ssh http https git irc sftp
show_hyperlink_targets yes

# ── WINDOW & PERFORMANCE (ARREGLO LENTITUD SSH/NC) ──
draw_minimal_borders yes
placement_strategy   center
active_border_color  #808000
inactive_text_alpha  0.6
splitbar_color       #00ff00
splitbar_width       3
background_opacity   0.92
background_tint      0.1

# PERFORMANCE (Latencia mínima para SSH/nc)
repaint_delay 0
input_delay 0
sync_to_monitor no
confirm_os_window_close 0
linux_display_server auto

# ── TAB BAR ──
tab_bar_edge              bottom
tab_bar_style             powerline
tab_bar_min_tabs          1
tab_separator             "  |  "
inactive_tab_background   #3a3a4a
inactive_tab_foreground   #999999
active_tab_background     #8839ef
active_tab_foreground     #ffffff
tab_bar_margin_width      0.1
tab_bar_margin_color      #000000
tab_activity_symbol       ●

# ── SHORTCUTS ──

# ── los tuyos, intactos ──
map ctrl+shift+r         reload_config
map ctrl+shift+z         toggle_fullscreen
map ctrl+shift+enter     new_window_with_cwd
map ctrl+shift+t         new_tab
map ctrl+alt+t           set_tab_title
map ctrl+shift+w         close_tab
map ctrl+w               close_window

# 🔄 Navegación entre ventanas/paneles (estilo Tmux)
map ctrl+left            neighboring_window left
map ctrl+right           neighboring_window right
map ctrl+up              neighboring_window up
map ctrl+down            neighboring_window down

# 🔍 Búsqueda
map ctrl+shift+/         search
map ctrl+shift+f         search

# 📏 Redimensionado
map ctrl+shift+up        resize_window taller 5
map ctrl+shift+down      resize_window shorter 5
map ctrl+shift+left      resize_window wider 5
map ctrl+shift+right     resize_window narrower 5

# 🛠️ Ejecutar nvim
map ctrl+shift+e         launch --cwd=current nvim

# ── nuevos ──

# 📋 Portapapeles
map ctrl+shift+c         copy_to_clipboard
map ctrl+shift+v         paste_from_clipboard

# 🔠 Tamaño de fuente
map ctrl+equal           change_font_size all +1.0
map ctrl+minus           change_font_size all -1.0
map ctrl+0               change_font_size all 0

# 📜 Scrollback extendido
map ctrl+shift+k         scroll_line_up
map ctrl+shift+j         scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end
# Saltar al prompt anterior/siguiente (requiere shell_integration)
map ctrl+alt+up          scroll_to_prompt -1
map ctrl+alt+down        scroll_to_prompt 1

# 🖼️ Splits estilo Tmux
map ctrl+alt+h           launch --location=vsplit --cwd=current
map ctrl+alt+v           launch --location=hsplit --cwd=current

# 🗂️ Navegación de tabs
map ctrl+shift+.         next_tab
map ctrl+shift+,         previous_tab
map ctrl+alt+1           goto_tab 1
map ctrl+alt+2           goto_tab 2
map ctrl+alt+3           goto_tab 3
map ctrl+alt+4           goto_tab 4
map ctrl+alt+5           goto_tab 5

# 🔗 Hints: seleccionar URLs/paths/palabras con teclado
map ctrl+shift+p>u       open_url_with_hints
map ctrl+shift+p>y       kitten hints --type url --program @
map ctrl+shift+p>f       kitten hints --type path
map ctrl+shift+p>w       kitten hints --type word --program @

# 🪟 Nueva ventana OS
map ctrl+shift+n         new_os_window_with_cwd

# 🗃️ Layouts
map ctrl+shift+l         next_layout
map ctrl+alt+z           toggle_layout stack

disable_meta_key yes
