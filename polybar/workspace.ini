[colors]
bg        = #3a3c4e
fg        = #f8f8f2
yellow    = #f1fa8c
purple    = #bd93f9
gray      = #9ca0b8
arch-blue = #1793D1
card-active = #626475

[settings]
screenchange-reload = true

[bar/main]
monitor =
width = 1300px
height = 38px
offset-x = 310px
offset-y = 12px
background = ${colors.bg}
foreground = ${colors.fg}
font-0 = "JetBrainsMono Nerd Font:size=10;2"
wm-restack = bspwm
override-redirect = true
fixed-center = false
border-radius = 12
border-size = 0
modules-left = arch bspwm
modules-center = xwindow
modules-right = clock
padding = 4
module-margin = 3

[module/arch]
type = custom/text
content = "ARCH "
content-foreground = ${colors.arch-blue}
content-padding = 2

[module/bspwm]
type = internal/bspwm
format = <label-state>
enable-click = true
enable-scroll = true
pin-workspaces = true
show-empty = true

ws-icon-0 = 1;1
ws-icon-1 = 2;2
ws-icon-2 = 3;3
ws-icon-3 = 4;4
ws-icon-4 = 5;5
ws-icon-5 = 6;6
ws-icon-6 = 7;7
ws-icon-7 = 8;8
ws-icon-8 = 9;9
ws-icon-9 = 10;10

label-focused = %icon%
label-focused-foreground = ${colors.yellow}
label-focused-background = ${colors.card-active}
label-focused-padding = 2

label-occupied = %icon%
label-occupied-foreground = ${colors.purple}
label-occupied-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.gray}
label-empty-padding = 1

label-separator = 
label-separator-padding = 0

[module/xwindow]
type = internal/xwindow
format = <label>
label = %title%
label-empty = "BSPWM"
label-empty-foreground = ${colors.gray}
label-maxlen = 40

[module/clock]
type = internal/date
interval = 1
date = "%H:%M"
label = %date%
label-foreground = ${colors.yellow}
label-padding = 2
